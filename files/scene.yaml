
scene:
  camera: "main"
  shape-instance-groups:
    - shape_01-group_one
    - shape_02-group_one
    - ball

cameras:
  main:
    geom:
      position: "0 0 10.0"
      forward: "0 0 -1.0"
      up: "0 1 0"
      near: "0.1"
      far: "100.0"
      fov: "25"
    params:
      forwardVelocity: "3"
      sideVelocity: "3"
      forwardMouseSensitivity: "0.10"
      forwardScrollStep: "1"

shapes:
  shape_01:
    mesh:
      ref: "meshes.yaml#main-tri-data"
    material:
      type: "solid"
      color: "0.15  0.85  0.35"

  shape_02:
    mesh:
      ref: "meshes.yaml#green-tri"
    material:
      type: "solid"
      color: "0.00  0.10  0.9"

  sphera_16x16:
    mesh:
      ref: "meshes2.yaml#sphera_16x16"
    material:
      type: "solid"
      color: "0.15  0.85  0.10"

shape-instance-groups:
  shape_01-group_one:
    shape:
      ref: "#shape_01"
    offsets:
      type: "i X Y Z"
      data: |
        # comments
         0    0.5   0.5   0
         1   -3     0    -1
         2    3     0    -1
         3    0    -3     1
         4    0     3     1
         5    3     3     1
         6   -3     3     1
         7   -3    -3     1
         8    3    -3     1

  shape_02-group_one:
    shape:
      ref: "#shape_02"
    offsets:
      type: "i X Y Z"
      data: |
        # comments
         0    0.5   0.5   0
         1   -3     0    -1
         2    3     0    -1
         3    0    -3     1
         4    0     3     1
         5    3     3     1
         6   -3     3     1
         7   -3    -3     1
         8    3    -3     1

  ball:
    shape:
      ref: "#sphera_16x16"
    offsets:
      type: "i X Y Z"
      data: |
        # comments
         0    0   0   0
