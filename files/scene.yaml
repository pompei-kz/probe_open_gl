
scene:
  camera: "main"
  sun:
    force: "1"
    direction: "0.3 0.3 -0.3"
    color: "1 1 1"
  params:
    background-color: "0.2 0.2 0.2"
  shape-groups:  # TODO it renamed from `shape-instance-group`
    - group-AAA
    - group-BBB

cameras:
  main:
    geom:
      position: "0 0 10.0"
      forward: "0 0 -1.0"
      up: "0 1 0"
      near: "0.1"
      far: "100.0"
      fov: "25"
    params:
      forwardVelocity: "3"
      sideVelocity: "3"
      forwardMouseSensitivity: "0.10"
      forwardScrollStep: "1"
      forwardRotateDegPSec: "90"

