
scene:
  camera: "main"
  figure-instance-groups:
    - figure_01-group_one

cameras:
  main:
    geom:
      position: "0 0 10.0"
      forward: "0 0 -1.0"
      up: "0 1 0"
      near: "0.1"
      far: "100.0"
      fov: "25"
    params:
      forwardVelocity: "3"
      sideVelocity: "3"
      forwardMouseSensitivity: "0.10"
      forwardScrollStep: "1"

meshes:
  main-tri-data:

    points:
      type: "i X Y Z CX CY CZ"
      data-ref: "./main-tri-data-points.txt"

    indexes:
      type: "i i i"
      data-ref: "./main-tri-data-indexes.txt"

  green-tri:
    points:
      type: "i X Y Z"
      data: |
        #i  X       Y     Z
         0 -0.900   0.40  0
         1 -0.750   0.10  0
         2 -0.600   0.40  0
     
         3  0.600   0.40  0
         4  0.750   0.10  0
         5  0.900   0.40  0
    indexes:
      type: "i i i"
      data: |
        0 1 2
        3 4 5

figures:
  figure_01:
    mesh:
      ref: "#main-tri-data"
    material:
      type: "solid"

  figure_02:
    mesh:
      ref: "#green-tri"
    material:
      type: "solid"
      color: "0.15  0.85  0.35"

figure-instance-groups:
  figure_01-group_one:
    figure:
      ref: "#figure_01"
    offsets:
      type: "i X Y Z"
      data: |
        # comments
         0    0.5   0.5   0
         1   -3     0    -1
         2    3     0    -1
         3    0    -3     1
         4    0     3     1
         5    3     3     1
         6   -3     3     1
         7   -3    -3     1
         8    3    -3     1
