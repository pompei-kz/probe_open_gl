
scene:
  camera: "main"
  sun:
    force: "1"
    direction: "0.3 0.3 -0.3"
    color: "1 1 1"
  params:
    background-color: "0.2 0.2 0.2"
  shape-instance-groups:
    - ball1
    - ball2

cameras:
  main:
    geom:
      position: "0 0 10.0"
      forward: "0 0 -1.0"
      up: "0 1 0"
      near: "0.1"
      far: "100.0"
      fov: "25"
    params:
      forwardVelocity: "3"
      sideVelocity: "3"
      forwardMouseSensitivity: "0.10"
      forwardScrollStep: "1"
      forwardRotateDegPSec: "90"

shapes:

  sphera_green:
    mesh:
      ref: "meshes.yaml#sphera_16x16"
    material:
      type: "solid"
      color: "0.15  0.85  0.10"

  sphera_blue:
    mesh:
      ref: "meshes.yaml#sphera_32x32"
    material:
      type: "solid"
      color: "0.1  0.35  0.90"

shape-instance-groups:
  ball1:
    shape:
      ref: "#sphera_green"
    offsets:
      type: "i X Y Z"
      data: |
        # i   X   Y   Z
          0   0   0   0
          1   0   3  -1
          2   2   2   1
          3   2  -2   0
          4  -2  -2   3

  ball2:
    shape:
      ref: "#sphera_blue"
    offsets:
      type: "i X Y Z"
      data: |
        # comments
        # i   X   Y   Z
          0   3   0  -2
          1  -3   0   0
          2   0   2   3
          3   2   2  -3
